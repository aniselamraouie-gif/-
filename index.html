<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بنك تواريخ الباك 2026 - الإصدار الشامل</title>
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #38bdf8; --correct: #10b981; --wrong: #ef4444; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app-container { width: 100%; max-width: 650px; text-align: center; }
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #334155; }
        .screen { background: #0f172a; border: 2px solid var(--accent); padding: 40px 20px; border-radius: 25px; min-height: 280px; margin-bottom: 20px; position: relative; box-shadow: 0 0 25px rgba(56, 189, 248, 0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #event-text { font-size: 1.5rem; font-weight: bold; line-height: 1.6; color: #f8fafc; }
        #date-text { font-size: 2.2rem; color: var(--accent); margin-top: 20px; visibility: hidden; transition: 0.3s; font-family: 'Courier New', monospace; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 18px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 1rem; }
        .btn-main { background: var(--accent); color: #020617; grid-column: span 2; }
        .btn-correct { background: var(--correct); color: white; display: none; }
        .btn-wrong { background: var(--wrong); color: white; display: none; }
        .visible { visibility: visible !important; }
        .badge { font-size: 0.8rem; background: rgba(56, 189, 248, 0.2); color: var(--accent); padding: 4px 12px; border-radius: 10px; margin-bottom: 15px; }
        .add-section { background: var(--card); padding: 20px; border-radius: 20px; margin-top: 30px; border: 1px dashed #334155; text-align: right; }
        .add-section input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 style="margin-bottom: 5px;">🎯 بنك التواريخ الشامل (باك 2026)</h2>
    <p style="color: #94a3b8; margin-bottom: 25px;">تم دمج جميع التواريخ من ملفاتك الشخصية</p>

    <div class="stats-bar">
        <div>✅ أتقنت: <b id="good-count">0</b></div>
        <div>❌ مراجعة: <b id="bad-count">0</b></div>
        <div>📊 الإجمالي: <b id="total-count">0</b></div>
    </div>

    <div class="screen">
        <span id="unit-tag" class="badge">جاهز؟</span>
        <div id="event-text">اضغط على الزر للسحب</div>
        <div id="date-text">-- / -- / ----</div>
    </div>

    <div class="btn-grid">
        <button id="spin-btn" class="btn-main" onclick="startSpin()">سحب تاريخ عشوائي 🎲</button>
        <button id="reveal-btn" class="btn-main" style="display:none;" onclick="reveal()">كشف التاريخ 🔓</button>
        <button id="wrong-btn" class="btn-wrong" onclick="markAs(false)">أحتاج مراجعة ❌</button>
        <button id="correct-btn" class="btn-correct" onclick="markAs(true)">حفظته تمامًا ✅</button>
    </div>

    <div class="add-section">
        <h4 style="margin: 0 0 10px 0; color: var(--accent); text-align: center;">➕ إضافة تاريخ جديد</h4>
        <input type="text" id="new-event" placeholder="اسم الحدث..">
        <input type="text" id="new-date" placeholder="التاريخ..">
        <button onclick="addNewDate()" style="background: var(--accent); color: #020617; width: 100%; padding: 10px; border-radius: 8px;">حفظ في القائمة</button>
    </div>

    <button onclick="resetData()" style="background:none; color:#475569; font-size:0.7rem; margin-top:40px; text-decoration:underline; border:none; cursor:pointer;">إعادة ضبط المصنع (حذف كل شيء)</button>
</div>

<script>

    { e: "سلم الشجعان", d: "23 أكتوبر 1958", u: "ثورة جزائرية", s: 0 },
    { e: "مظاهرات 11 ديسمبر بالجزائر", d: "11 ديسمبر 1960", u: "ثورة جزائرية", s: 0 },
    { e: "مظاهرات الجزائريين بفرنسا", d: "17 أكتوبر 1961", u: "ثورة جزائرية", s: 0 },
    { e: "مفاوضات إيفيان الثانية", d: "07-18 مارس 1962", u: "ثورة جزائرية", s: 0 },
    { e: "وقف إطلاق النار (عيد النصر)", d: "19 مارس 1962", u: "ثورة جزائرية", s: 0 },
    { e: "استفتاء تقرير المصير", d: "01 جويلية 1962", u: "ثورة جزائرية", s: 0 },
    { e: "الإعلان الرسمي عن الاستقلال", d: "05 جويلية 1962", u: "ثورة جزائرية", s: 0 },
    { e: "انضمام الجزائر لهيئة الأمم المتحدة", d: "08-13 أكتوبر 1962", u: "جزائر الاستقلال", s: 0 },
    { e: "حركة التصحيح الثوري (وصول بومدين)", d: "19 جوان 1965", u: "جزائر الاستقلال", s: 0 },
    { e: "المؤتمر الرابع لحركة عدم الانحياز بالجزائر", d: "05-09 سبتمبر 1973", u: "جزائر الاستقلال", s: 0 },
    { e: "وفاة هواري بومدين", d: "27 ديسمبر 1978", u: "جزائر الاستقلال", s: 0 },
    { e: "انتخاب الشاذلي بن جديد رئيساً", d: "07 فيفري 1979", u: "جزائر الاستقلال", s: 0 },
    { e: "صدور منشور التعددية الحزبية", d: "23 فيفري 1989", u: "جزائر الاستقلال", s: 0 }
];

let database = JSON.parse(localStorage.getItem('mega_bac_dates')) || fullData;
let currentItem = null;

function save() { localStorage.setItem('mega_bac_dates', JSON.stringify(database)); updateStats(); }

function updateStats() {
    document.getElementById('good-count').innerText = database.filter(i => i.s > 2).length;
    document.getElementById('bad-count').innerText = database.filter(i => i.s < 0).length;
    document.getElementById('total-count').innerText = database.length;
}

function addNewDate() {
    const ev = document.getElementById('new-event').value;
    const dt = document.getElementById('new-date').value;
    if(ev && dt) {
        database.push({ e: ev, d: dt, u: "إضافة يدوية", s: 0 });
        save();
        document.getElementById('new-event').value = ""; document.getElementById('new-date').value = "";
        alert("تمت الإضافة بنجاح!");
    }
}

function startSpin() {
    document.getElementById('date-text').classList.remove('visible');
    document.getElementById('reveal-btn').style.display = "none";
    let count = 0;
    let spin = setInterval(() => {
        document.getElementById('event-text').innerText = database[Math.floor(Math.random()*database.length)].e;
        count++;
        if(count > 12) { clearInterval(spin); selectSmartly(); }
    }, 60);
}

function selectSmartly() {
    let sorted = [...database].sort((a, b) => a.s - b.s);
    currentItem = sorted[Math.floor(Math.random() * Math.min(10, sorted.length))];
    document.getElementById('event-text').innerText = currentItem.e;
    document.getElementById('date-text').innerText = currentItem.d;
    document.getElementById('unit-tag').innerText = currentItem.u;
    document.getElementById('spin-btn').style.display = "none";
    document.getElementById('reveal-btn').style.display = "block";
}

function reveal() {
    document.getElementById('date-text').classList.add('visible');
    document.getElementById('reveal-btn').style.display = "none";
    document.getElementById('correct-btn').style.display = "block";
    document.getElementById('wrong-btn').style.display = "block";
}

function markAs(correct) {
    let idx = database.findIndex(i => i.e === currentItem.e);
    database[idx].s += correct ? 3 : -2;
    save();
    document.getElementById('correct-btn').style.display = "none";
    document.getElementById('wrong-btn').style.display = "none";
    document.getElementById('spin-btn').style.display = "block";
    document.getElementById('event-text').innerText = "تم التحديث.. التالي؟";
    document.getElementById('date-text').classList.remove('visible');
}

function resetData() { if(confirm("حذف كل التقدم؟")) { localStorage.removeItem('mega_bac_dates'); location.reload(); } }

window.onload = updateStats;
</script>
</body>
</html>
