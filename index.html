<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة باك 2026 - ذاكرة لا تموت</title>
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #38bdf8; --correct: #10b981; --wrong: #ef4444; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 600px; text-align: center; }
        
        .stats-bar { 
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
            background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #334155; 
        }

        .screen { 
            background: #0f172a; border: 2px solid var(--accent); padding: 50px 20px; 
            border-radius: 25px; min-height: 250px; margin-bottom: 20px; position: relative;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.1);
        }

        #event-text { font-size: 1.7rem; font-weight: bold; min-height: 70px; display: flex; align-items: center; justify-content: center; }
        #date-text { font-size: 2.3rem; color: var(--accent); margin-top: 20px; visibility: hidden; transition: 0.3s; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 18px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 1rem; }
        
        .btn-main { background: var(--accent); color: #020617; grid-column: span 2; }
        .btn-correct { background: var(--correct); color: white; display: none; }
        .btn-wrong { background: var(--wrong); color: white; display: none; }
        
        .visible { visibility: visible !important; }
        .badge { font-size: 0.8rem; display: block; color: var(--accent); margin-bottom: 5px; }

        /* ستايل قسم الإضافة الجديد */
        .add-section { 
            background: var(--card); padding: 20px; border-radius: 20px; margin-top: 30px; 
            border: 1px dashed #334155; text-align: right;
        }
        .add-section input {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155;
            background: #0f172a; color: white; box-sizing: border-box; text-align: center;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2 style="margin-bottom: 5px;">🧠 ذاكرة البكالوريا الذكية</h2>
    <p style="color: #94a3b8; margin-bottom: 25px;">التواريخ الرسمية + إضافاتك الشخصية</p>

    <div class="stats-bar">
        <div>✅ أتقنت: <b id="good-count">0</b></div>
        <div>❌ مراجعة: <b id="bad-count">0</b></div>
        <div>📊 كلي: <b id="total-seen">0</b></div>
    </div>

    <div class="screen">
        <span id="unit-tag" class="badge">الوحدة: --</span>
        <div id="event-text">جاهز للانطلاق؟</div>
        <div id="date-text">-- / -- / ----</div>
    </div>

    <div class="btn-grid">
        <button id="spin-btn" class="btn-main" onclick="startSpin()">تدوير واختيار ذكي 🎲</button>
        <button id="reveal-btn" class="btn-main" style="display:none;" onclick="reveal()">كشف التاريخ 🔓</button>
        <button id="wrong-btn" class="btn-wrong" onclick="markAs(false)">أحتاج مراجعة ❌</button>
        <button id="correct-btn" class="btn-correct" onclick="markAs(true)">حفظته تمامًا ✅</button>
    </div>

    <div class="add-section">
        <h4 style="margin: 0 0 10px 0; color: var(--accent); text-align: center;">➕ أضف تاريخاً من كراسك</h4>
        <input type="text" id="new-event" placeholder="اسم الحدث (مثلاً: وفاة هواري بومدين)">
        <input type="text" id="new-date" placeholder="التاريخ (مثلاً: 27 ديسمبر 1978)">
        <button onclick="addNewDate()" style="background: var(--accent); color: #020617; width: 100%; padding: 10px; margin-top: 5px;">حفظ في ذاكرتي</button>
    </div>

    <button onclick="resetData()" style="background:none; color:#475569; font-size:0.7rem; margin-top:40px; text-decoration:underline;">إعادة ضبط كل البيانات (حذف الحفظ)</button>
</div>

<script>
const defaultData = [
    { e: "مبدأ ترومان", d: "12 مارس 1947", u: "حرب باردة", s: 0 },
    { e: "مشروع مارشال", d: "05 جوان 1947", u: "حرب باردة", s: 0 },
    { e: "مبدأ جيدانوف", d: "22 سبتمبر 1947", u: "حرب باردة", s: 0 },
    { e: "تأسيس الكومنفورم", d: "06 أكتوبر 1947", u: "حرب باردة", s: 0 },
    { e: "منظمة الكوميكون", d: "25 جانفي 1949", u: "حرب باردة", s: 0 },
    { e: "حلف الناتو", d: "04 أفريل 1949", u: "حرب باردة", s: 0 },
    { e: "وفاة ستالين", d: "05 مارس 1953", u: "حرب باردة", s: 0 },
    { e: "اندلاع الثورة التحريرية", d: "01 نوفمبر 1954", u: "ثورة جزائرية", s: 0 },
    { e: "حلف بغداد", d: "24 فيفري 1955", u: "حرب باردة", s: 0 },
    { e: "حلف وارسو", d: "14 ماي 1955", u: "حرب باردة", s: 0 },
    { e: "هجومات الشمال القسنطيني", d: "20 أوت 1955", u: "ثورة جزائرية", s: 0 },
    { e: "مؤتمر الصومام", d: "20 أوت 1956", u: "ثورة جزائرية", s: 0 },
    { e: "تأميم قناة السويس", d: "26 جويلية 1956", u: "حركات تحرر", s: 0 },
    { e: "مشروع إيزنهاور", d: "05 جانفي 1957", u: "حرب باردة", s: 0 },
    { e: "قصف ساقية سيدي يوسف", d: "08 فيفري 1958", u: "ثورة جزائرية", s: 0 },
    { e: "الحكومة المؤقتة", d: "19 سبتمبر 1958", u: "ثورة جزائرية", s: 0 },
    { e: "مظاهرات 11 ديسمبر", d: "11 ديسمبر 1960", u: "ثورة جزائرية", s: 0 },
    { e: "بناء جدار برلين", d: "13 أوت 1961", u: "حرب باردة", s: 0 },
    { e: "مظاهرات 17 أكتوبر", d: "17 أكتوبر 1961", u: "ثورة جزائرية", s: 0 },
    { e: "وقف إطلاق النار", d: "19 مارس 1962", u: "ثورة جزائرية", s: 0 },
    { e: "استقلال الجزائر", d: "05 جويلية 1962", u: "ثورة جزائرية", s: 0 },
    { e: "سقوط جدار برلين", d: "09 نوفمبر 1989", u: "نظام دولي جديد", s: 0 },
    { e: "مؤتمر مالطا", d: "03-04 ديسمبر 1989", u: "نظام دولي جديد", s: 0 },
    { e: "حل حلف وارسو", d: "01 جويلية 1991", u: "نظام دولي جديد", s: 0 },
    { e: "قمة ألما آتا (نهاية السوفيات)", d: "21 ديسمبر 1991", u: "نظام دولي جديد", s: 0 }
];

let database = JSON.parse(localStorage.getItem('bac_dates_2026')) || defaultData;
let currentItem = null;

function save() {
    localStorage.setItem('bac_dates_2026', JSON.stringify(database));
    updateStats();
}

function updateStats() {
    const good = database.filter(i => i.s > 2).length;
    const bad = database.filter(i => i.s < 0).length;
    const totalCount = database.length;
    
    document.getElementById('good-count').innerText = good;
    document.getElementById('bad-count').innerText = bad;
    document.getElementById('total-seen').innerText = totalCount;
}

function addNewDate() {
    const evInput = document.getElementById('new-event');
    const dtInput = document.getElementById('new-date');
    if(evInput.value && dtInput.value) {
        database.push({ e: evInput.value, d: dtInput.value, u: "إضافة شخصية", s: 0 });
        save();
        evInput.value = ""; dtInput.value = "";
        alert("تمت إضافة التاريخ بنجاح!");
    }
}

function startSpin() {
    const eventText = document.getElementById('event-text');
    document.getElementById('date-text').classList.remove('visible');
    document.getElementById('reveal-btn').style.display = "none";
    
    let timer = 0;
    let fastSpin = setInterval(() => {
        eventText.innerText = database[Math.floor(Math.random()*database.length)].e;
        timer++;
        if(timer > 10) {
            clearInterval(fastSpin);
            selectSmartly();
        }
    }, 60);
}

function selectSmartly() {
    let sorted = [...database].sort((a, b) => a.s - b.s);
    currentItem = sorted[Math.floor(Math.random() * Math.min(8, sorted.length))];
    
    document.getElementById('event-text').innerText = currentItem.e;
    document.getElementById('date-text').innerText = currentItem.d;
    document.getElementById('unit-tag').innerText = "الوحدة: " + currentItem.u;
    
    document.getElementById('spin-btn').style.display = "none";
    document.getElementById('reveal-btn').style.display = "block";
}

function reveal() {
    document.getElementById('date-text').classList.add('visible');
    document.getElementById('reveal-btn').style.display = "none";
    document.getElementById('correct-btn').style.display = "block";
    document.getElementById('wrong-btn').style.display = "block";
}

function markAs(isCorrect) {
    let idx = database.findIndex(i => i.e === currentItem.e);
    if(isCorrect) {
        database[idx].s += 3;
    } else {
        database[idx].s -= 2;
    }
    
    save();
    
    document.getElementById('correct-btn').style.display = "none";
    document.getElementById('wrong-btn').style.display = "none";
    document.getElementById('spin-btn').style.display = "block";
    document.getElementById('event-text').innerText = "تم التحديث.. جاهز للتالي؟";
    document.getElementById('date-text').classList.remove('visible');
}

function resetData() {
    if(confirm("هل تريد مسح كل تقدمك؟")) {
        localStorage.removeItem('bac_dates_2026');
        location.reload();
    }
}

window.onload = updateStats;
</script>
</body>
</html>
