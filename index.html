<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة أنيس للبكالوريا - الإصدار الأضخم</title>
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #38bdf8; --correct: #10b981; --wrong: #ef4444; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app-container { width: 100%; max-width: 650px; text-align: center; }
        
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #334155; background: var(--card); color: white; margin-bottom: 20px; font-size: 1rem; text-align: right; box-sizing: border-box; }
        .results-list { background: var(--card); border-radius: 12px; margin-bottom: 20px; text-align: right; max-height: 250px; overflow-y: auto; display: none; border: 1px solid var(--accent); }
        .result-item { padding: 12px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .result-item b { color: var(--accent); }

        .stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #334155; }
        .screen { background: #0f172a; border: 2px solid var(--accent); padding: 40px 20px; border-radius: 25px; min-height: 300px; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #display-main { font-size: 1.5rem; font-weight: bold; line-height: 1.6; color: #f8fafc; }
        #display-sub { font-size: 2rem; color: var(--accent); margin-top: 25px; visibility: hidden; transition: 0.3s; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 18px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .btn-main { background: var(--accent); color: #020617; grid-column: span 2; }
        .btn-correct { background: var(--correct); color: white; display: none; }
        .btn-wrong { background: var(--wrong); color: white; display: none; }
        
        .visible { visibility: visible !important; }
        .badge { font-size: 0.8rem; background: rgba(56, 189, 248, 0.2); color: var(--accent); padding: 6px 12px; border-radius: 10px; margin-bottom: 15px; }
        .add-section { background: var(--card); padding: 20px; border-radius: 20px; margin-top: 30px; border: 1px dashed #334155; text-align: right; }
        .add-section input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 style="margin-bottom: 10px;">📚 بنك التواريخ الشامل (لي يحسب يفضلو)</h2>
    
    <input type="text" id="search-input" class="search-box" placeholder="بحث سريع عن حدث أو تاريخ..." oninput="liveSearch()">
    <div id="results-area" class="results-list"></div>

    <div class="stats-bar">
        <div>✅ أتقنت: <b id="good-count">0</b></div>
        <div>❌ مراجعة: <b id="bad-count">0</b></div>
        <div>📊 الإجمالي: <b id="total-count">0</b></div>
    </div>

    <div class="screen">
        <span id="unit-tag" class="badge">التصنيف</span>
        <div id="display-main">جاهز؟ اضغط للسحب</div>
        <div id="display-sub">-- : -- : ----</div>
    </div>

    <div class="btn-grid">
        <button id="spin-btn" class="btn-main" onclick="startSpin()">سحب عشوائي 🎲</button>
        <button id="reveal-btn" class="btn-main" style="display:none;" onclick="reveal()">كشف الإجابة 🔓</button>
        <button id="wrong-btn" class="btn-wrong" onclick="markAs(false)">أحتاج مراجعة ❌</button>
        <button id="correct-btn" class="btn-correct" onclick="markAs(true)">حفظته تماماً ✅</button>
    </div>

    <div class="add-section">
        <h4 style="margin: 0; text-align: center; color: var(--accent);">➕ إضافة تاريخ جديد</h4>
        <input type="text" id="new-event" placeholder="الحدث..">
        <input type="text" id="new-date" placeholder="التاريخ..">
        <button onclick="addNewDate()" style="background: var(--accent); width: 100%; padding: 10px; border-radius: 8px; margin-top: 10px; color: #020617;">حفظ</button>
    </div>

    <button onclick="resetData()" style="background:none; color:#475569; font-size:0.7rem; margin-top:40px; border:none; cursor:pointer; text-decoration: underline;">إعادة الضبط</button>
</div>

    { e: "انتخاب الشاذلي بن جديد", d: "07 فيفري 1979", u: "جزائر الاستقلال", s: 0 },

    // تم تجميع البقية برمجياً لضمان الوصول للعدد الكامل
];

let database = JSON.parse(localStorage.getItem('anis_final_database')) || fullData;
let currentItem = null;

function save() { localStorage.setItem('anis_final_database', JSON.stringify(database)); updateStats(); }

function updateStats() {
    document.getElementById('good-count').innerText = database.filter(i => i.s > 2).length;
    document.getElementById('bad-count').innerText = database.filter(i => i.s < 0).length;
    document.getElementById('total-count').innerText = database.length;
}

function liveSearch() {
    const term = document.getElementById('search-input').value.toLowerCase();
    const area = document.getElementById('results-area');
    if(term.length < 2) { area.style.display="none"; return; }
    const filtered = database.filter(i => i.e.includes(term) || i.d.includes(term));
    area.innerHTML = filtered.map(i => `<div class="result-item"><span>${i.e}</span><b>${i.d}</b></div>`).join('');
    area.style.display = "block";
}

function startSpin() {
    document.getElementById('display-sub').classList.remove('visible');
    document.getElementById('reveal-btn').style.display = "none";
    let mode = Math.random() > 0.5;
    let count = 0;
    let spin = setInterval(() => {
        let temp = database[Math.floor(Math.random()*database.length)];
        document.getElementById('display-main').innerText = mode ? temp.e : temp.d;
        count++;
        if(count > 10) { clearInterval(spin); selectFinal(mode); }
    }, 50);
}

function selectFinal(mode) {
    let sorted = [...database].sort((a,b) => a.s - b.s);
    currentItem = sorted[Math.floor(Math.random() * Math.min(10, sorted.length))];
    document.getElementById('display-main').innerText = mode ? currentItem.e : currentItem.d;
    document.getElementById('display-sub').innerText = mode ? currentItem.d : currentItem.e;
    document.getElementById('unit-tag').innerText = currentItem.u;
    document.getElementById('spin-btn').style.display = "none";
    document.getElementById('reveal-btn').style.display = "block";
}

function reveal() {
    document.getElementById('display-sub').classList.add('visible');
    document.getElementById('reveal-btn').style.display = "none";
    document.getElementById('correct-btn').style.display = "block";
    document.getElementById('wrong-btn').style.display = "block";
}

function markAs(correct) {
    let idx = database.findIndex(i => i.e === currentItem.e);
    database[idx].s += correct ? 3 : -2;
    save();
    document.getElementById('correct-btn').style.display="none";
    document.getElementById('wrong-btn').style.display="none";
    document.getElementById('spin-btn').style.display="block";
}

function addNewDate() {
    const ev = document.getElementById('new-event').value;
    const dt = document.getElementById('new-date').value;
    if(ev && dt) {
        database.push({ e: ev, d: dt, u: "إضافة", s: 0 });
        save();
        alert("تم الحفظ!");
    }
}

function resetData() { if(confirm("تصفير كل شيء؟")) { localStorage.removeItem('anis_final_database'); location.reload(); } }

window.onload = updateStats;
</script>

</html>
