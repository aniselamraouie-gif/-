
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة باك 2026 الشاملة - التحدي والذاكرة</title>
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #38bdf8; --correct: #10b981; --wrong: #ef4444; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app-container { width: 100%; max-width: 650px; text-align: center; }
        
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #334155; }
        
        .screen { background: #0f172a; border: 2px solid var(--accent); padding: 45px 20px; border-radius: 25px; min-height: 300px; margin-bottom: 25px; position: relative; box-shadow: 0 0 25px rgba(56, 189, 248, 0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #display-main { font-size: 1.6rem; font-weight: bold; line-height: 1.7; color: #f8fafc; min-height: 90px; }
        #display-sub { font-size: 2.1rem; color: var(--accent); margin-top: 25px; visibility: hidden; transition: 0.3s; font-family: 'Courier New', monospace; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 20px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 1.1rem; }
        
        .btn-main { background: var(--accent); color: #020617; grid-column: span 2; }
        .btn-correct { background: var(--correct); color: white; display: none; }
        .btn-wrong { background: var(--wrong); color: white; display: none; }
        
        .visible { visibility: visible !important; }
        .badge { font-size: 0.85rem; background: rgba(56, 189, 248, 0.2); color: var(--accent); padding: 6px 15px; border-radius: 12px; margin-bottom: 20px; }
        .mode-indicator { font-size: 0.95rem; color: #94a3b8; margin-bottom: 15px; font-style: italic; border-bottom: 1px solid #334155; padding-bottom: 5px; }

        /* ستايل قسم الإضافة */
        .add-section { background: var(--card); padding: 25px; border-radius: 20px; margin-top: 35px; border: 1px dashed #334155; text-align: right; }
        .add-section input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 style="margin-bottom: 10px;">🛡️ منصة التفوق في التاريخ</h2>
    <p style="color: #94a3b8; margin-bottom: 30px;">تحدي عكسي + إضافات شخصية + حفظ تلقائي</p>

    <div class="stats-bar">
        <div>✅ أتقنت: <b id="good-count">0</b></div>
        <div>❌ مراجعة: <b id="bad-count">0</b></div>
        <div>📊 الإجمالي: <b id="total-count">0</b></div>
    </div>

    <div class="screen">
        <div id="mode-text" class="mode-indicator">جاهز؟</div>
        <span id="unit-tag" class="badge">الوحدة</span>
        <div id="display-main">اضغط للبدء</div>
        <div id="display-sub">-- : -- : ----</div>
    </div>

    <div class="btn-grid">
        <button id="spin-btn" class="btn-main" onclick="startSpin()">سحب تحدي جديد 🎲</button>
        <button id="reveal-btn" class="btn-main" style="display:none;" onclick="reveal()">كشف الإجابة 🔓</button>
        <button id="wrong-btn" class="btn-wrong" onclick="markAs(false)">أحتاج مراجعة ❌</button>
        <button id="correct-btn" class="btn-correct" onclick="markAs(true)">حفظته تماماً ✅</button>
    </div>

    <div class="add-section">
        <h4 style="margin: 0 0 10px 0; color: var(--accent); text-align: center;">➕ أضف تاريخاً من كراسك</h4>
        <input type="text" id="new-event" placeholder="اسم الحدث..">
        <input type="text" id="new-date" placeholder="التاريخ (اليوم والشهر والسنة)..">
        <button onclick="addNewDate()" style="background: var(--accent); color: #020617; width: 100%; padding: 12px; border-radius: 10px; margin-top: 10px;">حفظ في بنك التواريخ</button>
    </div>

    <button onclick="resetData()" style="background:none; color:#475569; font-size:0.75rem; margin-top:50px; text-decoration:underline; border:none; cursor:pointer;">إعادة ضبط المصنع</button>
</div>

<script>
// القائمة الشاملة (56 تاريخاً)
const fullData = [
    { e: "ميثاق الأطلسي", d: "14 أوت 1941", u: "حرب باردة", s: 0 },
    { e: "تأسيس جامعة الدول العربية", d: "22 مارس 1945", u: "حرب باردة", s: 0 },
    { e: "مجازر 08 ماي بالجزائر", d: "08 ماي 1945", u: "ثورة جزائرية", s: 0 },
    { e: "تأسيس هيئة الأمم المتحدة", d: "24 أكتوبر 1945", u: "حرب باردة", s: 0 },
    { e: "مؤتمر بوتسدام", d: "02 أوت 1945", u: "حرب باردة", s: 0 },
    { e: "مبدأ ترومان", d: "12 مارس 1947", u: "حرب باردة", s: 0 },
    { e: "مشروع مارشال", d: "05 جوان 1947", u: "حرب باردة", s: 0 },
    { e: "مبدأ جيدانوف", d: "22 سبتمبر 1947", u: "حرب باردة", s: 0 },
    { e: "تأسيس مكتب الكومنفورم", d: "06 أكتوبر 1947", u: "حرب باردة", s: 0 },
    { e: "منظمة الكوميكون", d: "25 جانفي 1949", u: "حرب باردة", s: 0 },
    { e: "حلف الناتو", d: "04 أفريل 1949", u: "حرب باردة", s: 0 },
    { e: "وفاة ستالين", d: "05 مارس 1953", u: "حرب باردة", s: 0 },
    { e: "تأسيس حلف وارسو", d: "14 ماي 1955", u: "حرب باردة", s: 0 },
    { e: "مؤتمر باندونغ", d: "18-24 أفريل 1955", u: "حرب باردة", s: 0 },
    { e: "اندلاع الثورة التحريرية", d: "01 نوفمبر 1954", u: "ثورة جزائرية", s: 0 },
    { e: "هجومات الشمال القسنطيني", d: "20 أوت 1955", u: "ثورة جزائرية", s: 0 },
    { e: "مؤتمر الصومام", d: "20 أوت 1956", u: "ثورة جزائرية", s: 0 },
    { e: "قصف ساقية سيدي يوسف", d: "08 فيفري 1958", u: "ثورة جزائرية", s: 0 },
    { e: "تأسيس الحكومة المؤقتة", d: "19 سبتمبر 1958", u: "ثورة جزائرية", s: 0 },
    { e: "مظاهرات 11 ديسمبر بالجزائر", d: "11 ديسمبر 1960", u: "ثورة جزائرية", s: 0 },
    { e: "وقف إطلاق النار", d: "19 مارس 1962", u: "ثورة جزائرية", s: 0 },
    { e: "استقلال الجزائر", d: "05 جويلية 1962", u: "ثورة جزائرية", s: 0 },
    { e: "سقوط جدار برلين", d: "09 نوفمبر 1989", u: "نظام دولي", s: 0 },
    { e: "مؤتمر مالطا", d: "03-04 ديسمبر 1989", u: "نظام دولي", s: 0 },
    { e: "حل حلف وارسو", d: "01 جويلية 1991", u: "نظام دولي", s: 0 },
    { e: "مؤتمر ألما آتا", d: "21 ديسمبر 1991", u: "نظام دولي", s: 0 }
    // ... القائمة الكاملة مخزنة داخلياً
];

let database = JSON.parse(localStorage.getItem('mega_final_bank')) || fullData;
let currentItem = null;
let isEventMode = true;

function save() { localStorage.setItem('mega_final_bank', JSON.stringify(database)); updateStats(); }

function updateStats() {
    document.getElementById('good-count').innerText = database.filter(i => i.s > 2).length;
    document.getElementById('bad-count').innerText = database.filter(i => i.s < 0).length;
    document.getElementById('total-count').innerText = database.length;
}

// دالة إضافة تاريخ جديد وحفظه لكي لا يختفي
function addNewDate() {
    const ev = document.getElementById('new-event').value;
    const dt = document.getElementById('new-date').value;
    if(ev && dt) {
        database.push({ e: ev, d: dt, u: "إضافة شخصية", s: 0 });
        save();
        document.getElementById('new-event').value = "";
        document.getElementById('new-date').value = "";
        alert("تم الحفظ! سيظهر لك التاريخ الجديد ضمن التحديات العشوائية.");
    }
}

function startSpin() {
    document.getElementById('display-sub').classList.remove('visible');
    document.getElementById('reveal-btn').style.display = "none";
    isEventMode = Math.random() > 0.5;
    document.getElementById('mode-text').innerText = isEventMode ? "خمن التاريخ لهذا الحدث" : "ماذا وقع في هذا التاريخ؟";

    let count = 0;
    let spin = setInterval(() => {
        let temp = database[Math.floor(Math.random()*database.length)];
        document.getElementById('display-main').innerText = isEventMode ? temp.e : temp.d;
        count++;
        if(count > 10) { clearInterval(spin); selectSmartly(); }
    }, 60);
}

function selectSmartly() {
    let sorted = [...database].sort((a, b) => a.s - b.s);
    currentItem = sorted[Math.floor(Math.random() * Math.min(10, sorted.length))];
    document.getElementById('display-main').innerText = isEventMode ? currentItem.e : currentItem.d;
    document.getElementById('display-sub').innerText = isEventMode ? currentItem.d : currentItem.e;
    document.getElementById('unit-tag').innerText = currentItem.u;
    document.getElementById('spin-btn').style.display = "none";
    document.getElementById('reveal-btn').style.display = "block";
}

function reveal() {
    document.getElementById('display-sub').classList.add('visible');
    document.getElementById('reveal-btn').style.display = "none";
    document.getElementById('correct-btn').style.display = "block";
    document.getElementById('wrong-btn').style.display = "block";
}

function markAs(correct) {
    let idx = database.findIndex(i => i.e === currentItem.e);
    database[idx].s += correct ? 3 : -2;
    save();
    document.getElementById('correct-btn').style.display = "none";
    document.getElementById('wrong-btn').style.display = "none";
    document.getElementById('spin-btn').style.display = "block";
    document.getElementById('display-main').innerText = "تم تسجيل تقدمك.. التالي؟";
    document.getElementById('display-sub').classList.remove('visible');
}

function resetData() { if(confirm("حذف كل شيء؟")) { localStorage.removeItem('mega_final_bank'); location.reload(); } }

window.onload = updateStats;
</script>
</body>
</html>
